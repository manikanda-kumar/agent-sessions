agent_sessions_version: 3.9.3
as_of_commit: 8cb5c6ca
as_of_date: 2026-06-24
workflow_doc: "docs/agent-support/workflow.md"
notes:
  - "Max verified versions come from repo fixtures and documented format changes."
  - "Some agents do not log their own CLI version; those are marked unknown."
  - "Droid is retained for legacy imports and fixtures, but it is excluded from the active session-format monitoring set."
  - "2026-03-31 weekly check: bumped all 7 agents. Claude/Gemini additive schema drift (new keys). Copilot major version (0.0.420->1.0.11): storage layout changed to <uuid>/events.jsonl subdirectory; runtime patched in f77040f, monitoring config updated, new subdirectory fixture added."
  - "2026-04-06 weekly check: bumped OpenCode 1.3.17, Gemini 0.36.0, OpenClaw 2026.4.5 (schema unchanged). Claude 2.1.92 and Copilot 1.0.16: additive new event types (attachment, session.shutdown); schema_drift fixtures updated."
  - "2026-04-12 weekly check: bumped Claude 2.1.92->2.1.104 (attachment type additive, parser handles via .meta, drift test passes), Copilot 1.0.16->1.0.24 (session.shutdown additive, parser handles via default branch, drift test passes), OpenClaw 2026.4.5->2026.4.10 (schema unchanged, fresh session after mass-delete recovery). Prebump drivers failed (claude: --verbose flag needed; copilot: sandbox auth missing) — weekly evidence sufficient."
  - "2026-04-12: added cursor as 8th monitored agent. Initial verified version 2026.04.12 (date-based, no version embedded in transcripts)."
  - "2026-04-16 weekly check: bumped Codex 0.120.0->0.121.0, Claude 2.1.104->2.1.112 (additive stop_hook_summary/permission metadata preserved as .meta), OpenCode 1.4.3->1.4.6 (current storage is opencode.db SQLite; parser already supported SQLite, monitoring/capture updated), and OpenClaw 2026.4.10->2026.4.14 (schema unchanged, fresh local sample). Copilot 1.0.30 and Gemini 0.38.1 remained candidates pending auth-enabled fresh samples."
  - "2026-04-17 follow-up: bumped Gemini 0.37.1->0.38.1 and Copilot 1.0.24->1.0.31 from successful auth-enabled prebump runs; bumped OpenCode 1.4.6->1.4.7 and OpenClaw 2026.4.14->2026.4.15 from fresh local sessions. Gemini prebump now copies non-secret settings/account support files into the sandbox while keeping OAuth credentials under strict hygiene."
  - "2026-04-29 weekly check: bumped Codex 0.121.0->0.125.0, Claude 2.1.112->2.1.123, Gemini 0.38.1->0.40.0, Copilot 1.0.31->1.0.39, OpenCode 1.4.7->1.14.29, and OpenClaw 2026.4.15->2026.4.26. Gemini 0.40.0 moved fresh headless sessions to JSONL under chats/; discovery, parser, capture, monitoring, and fixtures were updated."
  - "2026-04-29 follow-up: added Hermes 0.11.0 canonical session JSON monitoring and excluded Droid from active session-format checks."
  - "2026-05-02 format checks: bumped Codex 0.125.0->0.128.0, Claude 2.1.123->2.1.126, Gemini 0.40.0->0.40.1, OpenCode 1.14.29->1.14.31, and Copilot 1.0.39->1.0.40. Copilot 1.0.40 added normal hook.start/hook.end envelopes; OpenCode 1.14.31 added top-level part.tool metadata. Gemini 0.40.1 requires explicit headless workspace trust for prebump validation. Existing parsers preserve these without UI changes."
  - "2026-05-02 OpenClaw follow-up: OpenClaw 2026.4.29 initially failed during plugin bootstrap because the bundled Telegram plugin could not load ../dist/babel.cjs from the runtime dependency cache. Running the plugin dependency inspection/repair path completed the cache; a fresh local agent session then matched baseline, so OpenClaw is verified at 2026.4.29."
  - "2026-05-07 format checks: bumped Codex 0.128.0->0.129.0, Claude 2.1.126->2.1.132, Gemini 0.40.1->0.41.2, Copilot 1.0.40->1.0.43, OpenCode 1.14.31->1.14.41, and OpenClaw 2026.4.29->2026.5.7. Claude 2.1.132 can add assistant attributionPlugin/attributionSkill metadata; the parser already preserves it as metadata and no UI change is needed. Copilot prebump now accepts COPILOT_GITHUB_TOKEN/GH_TOKEN/GITHUB_TOKEN auth env vars. OpenClaw 2026.5.7 required migrating legacy Telegram streaming config with openclaw doctor --fix before fresh local session evidence could be generated."
  - "Codex support covers local rollout JSONL sessions from Codex CLI, Codex Desktop, and the Codex VS Code extension; these remain one Codex corpus with per-session surface labels."
  - "2026-05-12: added Pi coding-agent tier-2 local support and weekly session-format monitoring. Evidence is official pi.dev session-format docs, a temporary local 0.74.0 capture under /tmp/as-agent-lab, checked-in fixture Resources/Fixtures/stage0/agents/pi/small.jsonl, focused parser/discovery/resume/probe tests, and a successful Debug build. Live status, analytics, and usage tracking remain unsupported."
  - "2026-05-12 follow-up: bumped Codex 0.129.0->0.130.0, Claude 2.1.132->2.1.140, Copilot 1.0.43->1.0.46, and OpenCode 1.14.41->1.14.48. Fresh Codex and Copilot prebump sessions matched baseline; Claude 2.1.140 matched baseline from a real-home headless transcript after sandbox auth remained unavailable; OpenCode local SQLite evidence matched baseline. No parser, UI, or UX changes were needed."
  - "2026-05-19 format checks: bumped Codex 0.130.0->0.131.0, Claude 2.1.140->2.1.144, Gemini 0.41.2->0.42.0, Copilot 1.0.46->1.0.49, OpenCode 1.14.48->1.15.5, and OpenClaw 2026.5.7->2026.5.18. Fresh prebump or local samples matched baseline after adding OpenClaw custom_message runtime-context coverage to the normal fixture baseline. No parser, UI, or UX changes were needed."
  - "2026-05-28 format check: bumped Codex 0.131.0->0.135.0, Claude 2.1.144->2.1.156, Gemini 0.42.0->0.44.1, Copilot 1.0.49->1.0.55, OpenCode 1.15.5->1.15.12, Hermes 0.11.0->0.15.0, OpenClaw 2026.5.18->2026.5.27, and Pi 0.74.0->0.76.0. Fresh local, capture, prebump, or Hermes state.db evidence matched baseline after adding Pi prebump support, Cursor fixture coverage, OpenClaw trajectory exclusion, Hermes state.db parsing, and weekly-prebump freshness bridging. Claude was verified after the five-hour reset with a successful standard-context Sonnet transcript."
  - "2026-06-02 format check: bumped Codex 0.135.0->0.136.0, Claude 2.1.156->2.1.160, Copilot 1.0.55->1.0.58, OpenCode 1.15.12->1.15.13, Hermes 0.15.0->0.15.1, OpenClaw 2026.5.27->2026.5.28, Cursor 3.5.38->2026.6.2, and Pi 0.76.0->0.78.0. Fresh real-session prebump evidence matched baseline for every configured active agent after adding real-session drivers for OpenCode, OpenClaw, Cursor, and Hermes."
  - "2026-06-03 Cursor follow-up: Cursor CLI latest-source monitoring now uses the official cursor.com/install installer script and Homebrew cursor-cli cask fallback; both identify latest build 2026.06.02-8c11d9f, normalized to 2026.6.2. Cursor Desktop agent-window store.db metadata is monitored by cursor_sqlite_probe with agentId, createdAt, mode, model, and meta-key schema evidence."
  - "2026-06-03 format follow-up: bumped Claude 2.1.160->2.1.161, Gemini 0.44.1->0.45.0, and Copilot 1.0.58->1.0.59. Fresh real-session prebump evidence matched baseline after adding Claude user.promptSource fixture coverage."
  - "2026-06-24 maintenance: active format monitoring moved from removed Gemini CLI support to Antigravity CLI (`agy`) markdown brain artifacts under ~/.gemini/antigravity/brain."
  - "2026-06-24 full format check: bumped Codex 0.136.0->0.142.0, Claude 2.1.161->2.1.190, OpenCode 1.15.13->1.17.9, Copilot 1.0.59->1.0.64, and Pi 0.78.0->0.80.1 from fresh real-session evidence. Pi remains supports_installed_only because upstream is 0.80.2. Antigravity 1.0.11 and OpenClaw 2026.6.9 initially remained blocked by stale/failed prebump evidence; Cursor 2026.6.24 and Hermes 0.17.0 remained upstream candidates pending latest-build validation."
  - "2026-06-24 targeted follow-up: updated OpenClaw 2026.6.9->2026.6.10 after openclaw doctor --fix and a fresh local-agent prebump matched baseline; updated Hermes 0.15.1->0.17.0 after hermes update and a fresh state.db prebump matched baseline. Final weekly report scripts/probe_scan_output/agent_watch/20260624-185801Z/report.json reports supports_latest for OpenClaw and Hermes. Antigravity 1.0.11 is current but remains blocked because agy -p answers without creating a monitored brain markdown artifact. Cursor remains verified at installed 2026.6.2 because cursor-agent update and cursor-agent --print are blocked by headless authentication."
